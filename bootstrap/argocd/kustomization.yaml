---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 9.4.17
    releaseName: argocd
    namespace: argocd
    valuesFile: resources/values.yaml

resources:
  - resources/namespace.yaml
  - resources/ingress.yaml
  - resources/project-default.yaml
  - resources/project-secrets.yaml
