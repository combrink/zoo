server:
  insecure: true

controller:
  extraContainers:
    - name: tailscale-sidecar
      image: ghcr.io/tailscale/tailscale:latest
      env:
        - name: TS_KUBE_SECRET
          value: ts-argocd
        - name: TS_USERSPACE
          value: "true"
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-argocd-authkey
              key: TS_AUTHKEY
              optional: true
        - name: TS_EXTRA_ARGS
          value: "--advertise-tags=tag:kubernetes-argocd"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000